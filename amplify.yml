version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node -v
        - npm -v
        - npm ci
        - npx prisma generate
    build:
      commands:
        - env | grep -e DATABASE_URL -e AUTH_SECRET -e MVP_SELLER_ID -e S3_BUCKET -e AWS_REGION -e KAKAO_REST_API_KEY -e KAKAO_CLIENT_SECRET -e NAVER_CLIENT_ID -e NAVER_CLIENT_SECRET -e TOSS_SECRET_KEY -e TOSS_LIVE_SECRET_KEY -e TOSS_TEST_SECRET_KEY -e TOSS_WEBHOOK_SECRET -e TOSS_PAYOUT_SECRET_KEY -e TOSS_PAYOUT_SECURITY_KEY -e BIZM_USER_ID -e BIZM_SENDER_PROFILE_KEY -e DATA_GO_KR_SERVICE_KEY -e ADMIN_PREFLIGHT_TOKEN >> .env
        - env | grep -e NEXT_PUBLIC_ >> .env || true
        - |
          for attempt in 1 2 3; do
            DATABASE_URL="${MIGRATE_DATABASE_URL:-$DATABASE_URL}" npx prisma migrate deploy && break
            status=$?
            if [ "$attempt" = "3" ]; then
              exit "$status"
            fi
            echo "Prisma migrate deploy failed, retrying in 20s..."
            sleep 20
          done
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
