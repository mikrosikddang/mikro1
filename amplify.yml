version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node -v
        - npm -v
        - npm ci
        - npx prisma generate
    build:
      commands:
        - env | grep -e DATABASE_URL -e AUTH_SECRET -e MVP_SELLER_ID -e S3_BUCKET -e AWS_REGION -e KAKAO_REST_API_KEY -e KAKAO_CLIENT_SECRET -e NAVER_CLIENT_ID -e NAVER_CLIENT_SECRET -e TOSS_SECRET_KEY -e TOSS_LIVE_SECRET_KEY -e TOSS_TEST_SECRET_KEY -e BIZM_USER_ID -e BIZM_SENDER_PROFILE_KEY -e DATA_GO_KR_SERVICE_KEY >> .env
        - env | grep -e NEXT_PUBLIC_ >> .env || true
        - npx prisma migrate deploy
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
